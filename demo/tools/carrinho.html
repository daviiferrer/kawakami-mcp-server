<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ver_carrinho</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --brand: #138d45; --brand-dark: #005e1b; --orange: #f97316; --red: #dc2626;
  --border: #e5e7eb; --ease: cubic-bezier(0.19,1,0.22,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:ui-sans-serif,-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
  background:#fff;color:#212121;-webkit-font-smoothing:antialiased;
  min-height:100dvh;display:flex;flex-direction:column;max-width:100%;
}

/* === Header (Fullscreen pattern) === */
.header{
  padding:16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.header h2{font-size:18px;font-weight:600}
.header button{
  background:none;border:none;padding:4px;cursor:pointer;
  color:#5f5f5f;display:flex;align-items:center;
}
.header button:hover{color:#212121}

/* === List === */
.list{flex:1;overflow-y:auto}

/* === Item (animate layout) === */
.item{
  display:flex;align-items:center;padding:12px 16px;gap:12px;
  border-bottom:1px solid var(--border);
  &[data-entering]{opacity:0;transform:translateX(-12px)}
  &[data-entering-active]{opacity:1;transform:translateX(0);transition:opacity .25s var(--ease),transform .25s var(--ease)}
}
.item:last-child{border-bottom:none}
.item-img{width:52px;height:52px;object-fit:contain;background:#fafafa;border-radius:8px;border:1px solid var(--border);flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-unit{font-size:12px;color:#5f5f5f;margin-top:2px}
.item-tag{font-size:10px;font-weight:600;padding:1px 6px;color:#fff;display:inline-block;margin-top:2px;letter-spacing:.01em}
.tag-club{background:var(--orange)}.tag-exclusive{background:#2f3138}.tag-weekly{background:var(--brand)}

/* Qty */
.item-qty{display:flex;align-items:center;gap:8px;margin-top:6px}
.item-qty button{
  width:28px;height:28px;border:1px solid var(--border);background:#fff;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#212121;font-weight:500;border-radius:6px;
  transition:background .15s var(--ease);
}
.item-qty button:active{background:#f5f5f5}
.item-qty span{min-width:20px;text-align:center;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}

/* Price */
.item-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.item-price{font-size:16px;font-weight:600}
.item-price.offer{color:var(--brand-dark)}
.item-old{font-size:11px;color:#9e9e9e;text-decoration:line-through}
.item-remove{
  font-size:11px;font-weight:500;color:#9e9e9e;cursor:pointer;border:none;
  background:none;display:flex;align-items:center;gap:2px;padding:2px;
}
.item-remove:hover{color:var(--red)}

/* === Empty === */
.empty{
  padding:64px 16px;text-align:center;color:#9e9e9e;font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty svg{opacity:.25}

/* === Footer (Fullscreen pattern) === */
.footer{
  padding:16px;border-top:2px solid var(--brand);
  display:flex;justify-content:space-between;align-items:center;
  background:#fff;
}
.footer-label{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#5f5f5f}
.footer-amount{font-size:22px;font-weight:700;color:var(--brand-dark)}
.footer-items{font-size:11px;color:#5f5f5f;display:block}
.footer-cta{
  width:100%;padding:14px 0;background:var(--brand);color:#fff;border:none;
  font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:8px;transition:background .15s var(--ease);
}
.footer-cta:hover{background:var(--brand-dark)}
</style>
</head>
<body>

<div class="header">
  <h2>Carrinho</h2>
  <button onclick="clearAll()" title="Limpar">
    <svg data-lucide="trash-2" style="width:18px;height:18px"></svg>
  </button>
</div>

<div class="list" id="cartList"></div>

<div class="footer">
  <div>
    <span class="footer-label">Total</span>
    <span class="footer-items" id="footerItems"></span>
  </div>
  <span class="footer-amount" id="footerTotal">R$ 0,00</span>
</div>
<button class="footer-cta" id="checkoutBtn">
  <svg data-lucide="credit-card" style="width:18px;height:18px"></svg> Finalizar
</button>

<script>
const IMG='https://produto-assets-vipcommerce-com-br.br-se1.magaluobjects.com/250x250'

// Estado (viria do MCP)
let cart=[
  {id:285,n:"Mac. Nissin Lamen 85g Bacon",pu:2.79,qty:2,sub:5.58,un:"UN",img:"6699785a-5a94-4a14-ad57-6094f8de5afc.jpg",off:true,pa:3.18,tn:"Exclusiva App",tag:"tag-exclusive"},
  {id:12827,n:"Leite L.vida Terra Viva 1lt Integral",pu:5.85,qty:1,sub:5.85,un:"UN",img:"4dd5bdb3-9133-4722-9f0d-1b34faeea910.jpg",off:false,pa:null,tn:null,tag:null},
  {id:9522,n:"Sabao Po Omo 1,6kg Puro Cuidado",pu:18.99,qty:1,sub:18.99,un:"UN",img:"c0f9116a-a928-4dc6-823c-fbc925c28bb2.jpg",off:true,pa:26.38,tn:"Clube Amigo",tag:"tag-club"},
]

function fmt(n){return'R$ '+n.toFixed(2).replace('.',',')}
function changeQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);else cart[i].sub=cart[i].qty*cart[i].pu;render()}
function removeItem(i){cart.splice(i,1);render()}
function clearAll(){cart=[];render()}

function render(){
  const list=document.getElementById('cartList')
  if(!cart.length){
    list.innerHTML=`<div class="empty"><svg data-lucide="shopping-cart" style="width:48px;height:48px"></svg> Carrinho vazio</div>`
  }else{
    list.innerHTML=cart.map((c,i)=>`
      <div class="item" data-entering data-entering-active style="animation-delay:${i*40}ms">
        <img class="item-img" src="${IMG}/${c.img}" alt="${c.n}">
        <div class="item-info">
          <div class="item-name">${c.n}</div>
          <div class="item-unit">${fmt(c.pu)}/${c.un}</div>
          ${c.tn?`<span class="item-tag ${c.tag}">${c.tn}</span>`:''}
          <div class="item-qty">
            <button onclick="changeQty(${i},-1)">-</button><span>${c.qty}</span><button onclick="changeQty(${i},1)">+</button>
          </div>
        </div>
        <div class="item-right">
          <span class="item-price${c.off?' offer':''}">${fmt(c.sub)}</span>
          ${c.off&&c.pa?`<span class="item-old">${fmt(c.pa*c.qty)}</span>`:''}
          <button class="item-remove" onclick="removeItem(${i})"><svg data-lucide="x" style="width:14px;height:14px"></svg> remover</button>
        </div>
      </div>
    `).join('')
  }
  const total=cart.reduce((s,c)=>s+c.sub,0)
  const units=cart.reduce((s,c)=>s+c.qty,0)
  document.getElementById('footerItems').textContent=units+' unidade'+(units>1?'s':'')
  document.getElementById('footerTotal').textContent=fmt(total)
  document.getElementById('checkoutBtn').style.display=cart.length?'flex':'none'
  lucide.createIcons()
}
render()
</script>
</body>
</html>
