services:
  kawakami:
    build:
      context: .
    image: kawakami-mcp:local
    restart: unless-stopped
    environment:
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: "8000"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/mcp')\""]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-cred.json:/etc/cloudflared/cred.json:ro
    network_mode: service:kawakami
    depends_on:
      - kawakami
