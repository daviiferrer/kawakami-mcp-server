services:
  kawakami:
    build:
      context: .
    image: kawakami-mcp:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KWK_SESSION_DB_PATH: /data/kawakami_sessions.db
      KWK_TOKEN_FILE_PATH: /data/.kawakami_token.json
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - kawakami-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-cred.json:/etc/cloudflared/cred.json:ro
    network_mode: service:kawakami
    depends_on:
      kawakami:
        condition: service_healthy

volumes:
  kawakami-data:
